name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install --include=optional --no-audit --no-fund

      - name: Ensure native binaries
        run: |
          set -euo pipefail
          ROLLUP_VERSION=$(node -p "require('rollup/package.json').version")
          LIGHTNING_VERSION=$(node -e "const fs=require('fs'); const path=require('path'); const entry=require.resolve('lightningcss'); const pkg=path.resolve(path.dirname(entry), '..', 'package.json'); console.log(JSON.parse(fs.readFileSync(pkg, 'utf8')).version);")
          npm install --no-save "@rollup/rollup-linux-x64-gnu@${ROLLUP_VERSION}" "lightningcss-linux-x64-gnu@${LIGHTNING_VERSION}"

      - name: Build app
        run: npm run build

      - name: Setup SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          touch ~/.ssh/known_hosts
          ssh-keyscan -T 10 -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy via rsync
        run: |
          set -euo pipefail
          SSH_OPTS="-i $HOME/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=6"
          retry() {
            local attempts="${1:-5}"
            shift || true
            local delay=3
            local i=1
            until "$@"; do
              if [ "$i" -ge "$attempts" ]; then
                return 1
              fi
              echo "Attempt $i/$attempts failed; retrying in ${delay}s..." >&2
              sleep "$delay"
              i=$((i + 1))
              delay=$((delay * 2))
            done
          }
          retry 5 ssh $SSH_OPTS ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p /var/www/ourfund/dist"
          retry 5 rsync -avz --delete \
            -e "ssh $SSH_OPTS" \
            dist/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/ourfund/dist/
          retry 5 rsync -avz \
            -e "ssh $SSH_OPTS" \
            package.json package-lock.json ecosystem.config.cjs server.mjs \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/ourfund/
          retry 5 rsync -avz --delete \
            -e "ssh $SSH_OPTS" \
            prisma/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/ourfund/prisma/

      - name: Install server deps & restart app
        run: |
          set -euo pipefail
          SSH_OPTS="-i $HOME/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=6"
          retry() {
            local attempts="${1:-5}"
            shift || true
            local delay=3
            local i=1
            until "$@"; do
              if [ "$i" -ge "$attempts" ]; then
                return 1
              fi
              echo "Attempt $i/$attempts failed; retrying in ${delay}s..." >&2
              sleep "$delay"
              i=$((i + 1))
              delay=$((delay * 2))
            done
          }
          retry 5 ssh $SSH_OPTS \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "set -euo pipefail && \
             cd /var/www/ourfund && \
             printf '%s\n' \
               'DATABASE_URL=${{ secrets.DATABASE_URL }}' \
               'GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}' \
               'JWT_SECRET=${{ secrets.JWT_SECRET }}' \
               'PORT=3002' \
               'NODE_ENV=production' \
               'VITE_EMPTY_DATA=false' \
               > .env && \
             npm install --no-audit --no-fund && \
             npx prisma migrate deploy && \
             npx prisma generate && \
             (pm2 restart ourfund-web --update-env || pm2 start ecosystem.config.cjs --only ourfund-web)"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
